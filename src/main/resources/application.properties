spring.application.name=final_project

# Spring Boot 4 uses spring.mongodb.* only. spring.data.mongodb.* is ignored → default is mongodb://localhost/test.
# Put the DB name in the URI and set database= for clarity. OS env SPRING_MONGODB_URI overrides when pin is off.
spring.mongodb.uri=mongodb://localhost:27017/student
spring.mongodb.database=student
# Legacy keys (Python scripts / notes); Boot does not read these for the driver:
spring.data.mongodb.uri=mongodb://localhost:27017/student
spring.data.mongodb.database=student
# Set false in Docker/CI (see docker-compose) so SPRING_MONGODB_URI can point at the compose mongo service.
app.mongodb.use-localhost-only=true

# Create student_dropouts, course_recommendation, and profiles (Student) collections if missing (Compass).
app.student.ensure-ml-collections=true

# test→student migration: runs on startup while copy-test-to-student=true. After first success, a marker in
# student._app_migrations skips re-copy. Set force-rerun=true once to migrate again (e.g. after refreshing test data).
# Optional HTTP: POST /api/v1/admin/migrations/test-to-student + header X-Migration-Token when http-token is set.
app.migration.copy-test-to-student=true
app.migration.force-rerun=false
app.migration.drop-source-test=false
app.migration.seed-demo-identities=false
app.migration.http-token=

# faculty + admin_portal DBs: empty collections for portal features (skips after marker unless force-bootstrap=true)
app.portal.bootstrap-databases=true
app.portal.force-bootstrap=false

# Server Port (Render injects PORT; local default 8080)
server.port=${PORT:8080}

# Avoid HTML whitelabel for unknown paths (use JSON / plain errors; UI is on Vite/nginx).
server.error.whitelabel.enabled=false

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.example.demo=INFO
